<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>冒険スタート</title>


<style>

/* 余白を消す */
body {
  margin: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}


/* ゲーム画面 */
.game-screen {

  position: relative;

  width: 100vw;
  height: 100vh;

}


/* 背景画像 */
.game-screen img {

  width: 100%;
  height: 100%;

  object-fit: cover;

  display: block;

}



/* すすむ透明ボタン */

.next-button {

  position: absolute;


  /* 矢印の位置 */
  top: 65%;
  left: 68%;


  /* クリック範囲 */
  width: 27%;
  height: 12%;


  /* 完全透明 */
  background: transparent;


  cursor: pointer;

}



/* 位置調整用（確認するときだけ使う）

.next-button {
  background: rgba(255,0,0,0.3);
}

*/


</style>


</head>



<body>


<div class="game-screen">


  <!-- マップ -->
  <img src="mappage.png" alt="冒険スタート">


  <!-- すすむボタン -->
  <a href="stage1.html" class="next-button"></a>


</div>



</body>

</html>
